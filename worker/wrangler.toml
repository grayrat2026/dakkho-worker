name = "dakkho-admin-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain (requires DNS setup)
# routes = [
#   { pattern = "api.dakkho.pro.bd/*", zone_name = "dakkho.pro.bd" }
# ]

# R2 Buckets (native binding — no HTTP API needed!)
[[r2_buckets]]
binding = "R2_VIDEOS"
bucket_name = "dakkho-videos"

[[r2_buckets]]
binding = "R2_THUMBNAILS"
bucket_name = "dakkho-thumbnails"

[[r2_buckets]]
binding = "R2_AVATARS"
bucket_name = "dakkho-avatars"

[[r2_buckets]]
binding = "R2_RESOURCES"
bucket_name = "dakkho-resources"

[[r2_buckets]]
binding = "R2_SUPPORT_ATTACHMENTS"
bucket_name = "dakkho-support-attachments"

# Workers KV — for config/cache
[[kv_namespaces]]
binding = "KV_CONFIG"
id = "f61a482ba88a45bebb35dfd600cd742d"

# D1 Database — primary data store (replaces Appwrite)
[[d1_databases]]
binding = "DB"
database_name = "dakkho-admin-db"
database_id = "2e3dabbe-1e5d-44c7-a7d1-eba001aa0a4a"

# Environment Variables
[vars]
RESEND_FROM_EMAIL = "noreply@dakkho.pro.bd"
RESEND_SUPPORT_EMAIL = "support@dakkho.pro.bd"
ENVIRONMENT = "production"
PIPRAPAY_BASE_URL = "https://pay.dakkho.pro.bd"

# Secrets (set via `wrangler secret put`):
# RESEND_API_KEY
# ADMIN_SECRET_KEY
# ONE_SIGNAL_APP_ID
# ONE_SIGNAL_REST_API_KEY
# PIPRAPAY_API_KEY
# LIVEKIT_API_KEY
# LIVEKIT_API_SECRET

# Cron Triggers
[triggers]
crons = ["0 3 * * *"]
